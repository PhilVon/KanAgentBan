<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KanAgentBan</title>
    <!-- href set per-board by app.js (applyBoardIdentity); empty data URI
         suppresses the default /favicon.ico request until then. -->
    <link id="favicon" rel="icon" href="data:," />
    <!-- Self-hosted Font Awesome Pro (Classic Solid + Regular); vendored on build. -->
    <link rel="stylesheet" href="vendor/fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>KanAgentBan</h1>
      <button id="add-task" class="add-task"><i class="fa-solid fa-plus" aria-hidden="true"></i> Add task</button>
      <button id="metrics-btn" class="ghost"><i class="fa-solid fa-chart-simple" aria-hidden="true"></i> Metrics</button>
      <input id="filter" class="filter" type="search" placeholder="filter… (title, id, @assignee, label)" autocomplete="off" />
      <button id="notify-btn" class="ghost" aria-label="Enable desktop notifications" title="Enable desktop notifications when the agent needs your input"><i class="fa-solid fa-bell" aria-hidden="true"></i></button>
      <span id="conn" class="conn">connecting…</span>
    </header>

    <section id="inbox" class="inbox hidden">
      <h2><i class="fa-solid fa-circle-question" aria-hidden="true"></i> Needs your input</h2>
      <div id="inbox-items"></div>
    </section>

    <section id="metrics-panel" class="metrics-panel hidden">
      <div class="metrics-head">
        <h2><i class="fa-solid fa-chart-simple" aria-hidden="true"></i> Metrics</h2>
        <button id="metrics-close" class="ghost" aria-label="Close metrics"><i class="fa-solid fa-xmark" aria-hidden="true"></i></button>
      </div>
      <div id="metrics-body"></div>
    </section>

    <main id="board" class="board"></main>

    <div id="drawer-backdrop" class="drawer-backdrop"></div>
    <div id="drawer" class="drawer">
      <button id="drawer-close" class="close" aria-label="Close"><i class="fa-solid fa-xmark" aria-hidden="true"></i></button>
      <div id="drawer-body"></div>
    </div>

    <div id="create-modal" class="modal-overlay hidden">
      <form id="create-form" class="modal">
        <h2>New task</h2>
        <label>Title<input id="ct-title" type="text" required autocomplete="off" /></label>
        <div class="modal-row">
          <label>Priority
            <select id="ct-priority">
              <option value="P0">P0</option>
              <option value="P1">P1</option>
              <option value="P2" selected>P2</option>
              <option value="P3">P3</option>
            </select>
          </label>
          <label>Column<select id="ct-status"></select></label>
        </div>
        <label>Description<textarea id="ct-desc" rows="3"></textarea></label>
        <div class="modal-actions">
          <button type="button" id="ct-cancel" class="ghost">Cancel</button>
          <button type="button" id="ct-create" class="send">Create</button>
        </div>
      </form>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="app.js"></script>
  </body>
</html>
